<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ユーセーくんはどっちがすき？</title>
  <meta name="theme-color" content="#fff2a1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ユーセー君" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="mascot.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="screen">
    <button class="icon-btn home" type="button" aria-label="ホーム">
      <img src="home.png" alt="">
    </button>

    <button class="icon-btn speaker-top" type="button" aria-label="音量">
      <img src="speaker.png" alt="">
    </button>

    <section class="hero">
      <img id="mascot" class="mascot" src="mascot.png" alt="">
      <div class="question-wrap">
        <h1>ユーセーくんは<br>どっちがすき？</h1>
        <button id="speakBtn" class="voice-btn" type="button" aria-label="もういちどきく">
          <img src="speaker.png" alt="">
        </button>
      </div>
    </section>

    <section class="choices" aria-label="2択">
      <button id="leftChoice" class="choice choice-left" type="button">
        <span id="leftEmoji" class="choice-img">🍙</span>
        <span id="leftLabel" class="choice-label">おにぎり</span>
      </button>

      <button id="rightChoice" class="choice choice-right" type="button">
        <span id="rightEmoji" class="choice-img">🍞</span>
        <span id="rightLabel" class="choice-label">パン</span>
      </button>
    </section>

    <div class="status">いま：<span id="statusText">おにぎり / パン</span></div>
    <div id="reaction" class="reaction">いいねぇ！</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
